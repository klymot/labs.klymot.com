<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>labs.klymot</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32' fill='none'%3E%3Ccircle cx='16' cy='16' r='13' fill='%230a1628'/%3E%3Ccircle cx='16' cy='16' r='13' stroke='%23d4a855' stroke-width='1.25'/%3E%3Cellipse cx='16' cy='16' rx='13' ry='4.2' stroke='%23d4a855' stroke-width='0.8' opacity='0.5'/%3E%3Cellipse cx='16' cy='9.5' rx='10' ry='2.8' stroke='%23d4a855' stroke-width='0.8' opacity='0.5'/%3E%3Cellipse cx='16' cy='22.5' rx='10' ry='2.8' stroke='%23d4a855' stroke-width='0.8' opacity='0.5'/%3E%3Cellipse cx='16' cy='16' rx='3' ry='13' stroke='%23d4a855' stroke-width='0.8' opacity='0.5'/%3E%3Cellipse cx='16' cy='16' rx='9' ry='13' stroke='%23d4a855' stroke-width='0.8' opacity='0.5'/%3E%3Ccircle cx='19.5' cy='10.5' r='4' stroke='%23d4a855' stroke-width='1' fill='none' opacity='0.45'/%3E%3Ccircle cx='19.5' cy='10.5' r='2' fill='%23d4a855'/%3E%3C/svg%3E">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Source+Sans+3:wght@300;400;600&family=JetBrains+Mono:wght@400&display=swap');

        :root {
            --bg-primary: #0a1628;
            --bg-secondary: #0f2047;
            --bg-elevated: #152c4a;
            --text-primary: #e8e4d8;
            --text-secondary: #a8a090;
            --text-muted: #5a6880;
            --accent-primary: #d4a855;
            --accent-hover: #e0bc72;
            --border-color: rgba(212, 168, 85, 0.20);
            --border-strong: rgba(212, 168, 85, 0.42);
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            font-family: 'Source Sans 3', system-ui, sans-serif;
            color: var(--text-primary);
            background:
                radial-gradient(circle at top left, rgba(212, 168, 85, 0.08), transparent 24rem),
                var(--bg-primary);
        }

        a { color: inherit; text-decoration: none; }

        .page {
            min-height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        .header-inner, .main {
            width: min(920px, calc(100% - 2rem));
            margin: 0 auto;
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.8rem 0;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            min-width: 0;
        }

        .brand-mark {
            color: var(--accent-primary);
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .brand-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1;
        }

        .brand-subtitle {
            display: block;
            font-size: 0.7rem;
            letter-spacing: 0.14em;
            color: var(--text-muted);
            font-variant-caps: all-small-caps;
            margin-top: 0.15rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.55rem 0.85rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: rgba(15, 32, 71, 0.92);
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .btn:hover {
            color: var(--text-primary);
            border-color: var(--border-strong);
            background: var(--bg-secondary);
        }

        .btn-accent {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: var(--bg-primary);
        }

        .btn-accent:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
            color: var(--bg-primary);
        }

        .main {
            flex: 1;
            padding: 1.5rem 0 2rem;
        }

        .hero {
            padding: 0.25rem 0 1rem;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            letter-spacing: 0.14em;
            font-variant-caps: all-small-caps;
            font-size: 0.75rem;
        }

        h1 {
            margin: 0.65rem 0 0.5rem;
            font-family: 'Playfair Display', Georgia, serif;
            font-size: clamp(2.2rem, 5vw, 4rem);
            line-height: 0.95;
            letter-spacing: 0.01em;
        }

        .lede {
            max-width: 46rem;
            margin: 0;
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.5;
        }

        .labs {
            margin-top: 1.5rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1rem;
        }

        .lab-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.18);
        }

        .lab-card:hover {
            border-color: var(--border-strong);
        }

        .lab-name {
            margin: 0;
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.4rem;
        }

        .lab-meta {
            margin-top: 0.35rem;
            color: var(--text-muted);
            font-size: 0.78rem;
            letter-spacing: 0.12em;
            font-variant-caps: all-small-caps;
        }

        .lab-desc {
            margin: 0.9rem 0 1rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .lab-actions {
            display: flex;
            gap: 0.65rem;
            flex-wrap: wrap;
        }

        .footer {
            width: min(920px, calc(100% - 2rem));
            margin: 0 auto;
            padding: 0 0 1.25rem;
            color: var(--text-muted);
            font-size: 0.75rem;
        }
    </style>
    <script>
        (function () {
            var h = window.location.hostname;
            if (h === 'localhost' || h === '127.0.0.1') return;
            var payload = JSON.stringify({ path: 'labs.klymot.com' + window.location.pathname, referrer: document.referrer || '' });
            var blob = new Blob([payload], { type: 'text/plain' });
            if (navigator.sendBeacon) {
                navigator.sendBeacon('https://api.klymot.com/api/v1/usage', blob);
            } else {
                fetch('https://api.klymot.com/api/v1/usage', { method: 'POST', body: blob, keepalive: true }).catch(function () {});
            }
        }());
    </script>
</head>
<body>
    <div class="page">
        <header class="header">
            <div class="header-inner">
                <a class="brand" href="https://klymot.com" aria-label="klymot home">
                    <span class="brand-mark" aria-hidden="true">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" width="24" height="24"><circle cx="16" cy="16" r="13" stroke="currentColor" stroke-width="1.25"/><ellipse cx="16" cy="16" rx="13" ry="4.2" stroke="currentColor" stroke-width="0.8" opacity="0.5"/><ellipse cx="16" cy="9.5" rx="10" ry="2.8" stroke="currentColor" stroke-width="0.8" opacity="0.5"/><ellipse cx="16" cy="22.5" rx="10" ry="2.8" stroke="currentColor" stroke-width="0.8" opacity="0.5"/><ellipse cx="16" cy="16" rx="3" ry="13" stroke="currentColor" stroke-width="0.8" opacity="0.5"/><ellipse cx="16" cy="16" rx="9" ry="13" stroke="currentColor" stroke-width="0.8" opacity="0.5"/><circle cx="19.5" cy="10.5" r="4" stroke="currentColor" stroke-width="1" fill="none" opacity="0.4"/><circle cx="19.5" cy="10.5" r="2" fill="currentColor"/></svg>
                    </span>
                    <span>
                        <span class="brand-title">klymot</span>
                        <span class="brand-subtitle">labs</span>
                    </span>
                </a>
                <a class="btn" href="https://klymot.com">klymot.com</a>
            </div>
        </header>

        <main class="main">
            <section class="hero">
                <div class="eyebrow">Labs</div>
                <h1>klymot labs</h1>
                <p class="lede">
                    Small experimental tools built around the Klymot climate data stack.
                </p>
            </section>

            <section class="labs" aria-label="Available labs">
                <a class="lab-card" href="./sunshine-temperature/index.html">
                    <div class="lab-meta">lab 01</div>
                    <h2 class="lab-name">Sunshine &amp; Temperature</h2>
                    <p class="lab-desc">
                        Compare QC sunshine against Raw and Adjusted temperature records,
                        inspect lagged correlation, and switch between monthly and yearly views.
                    </p>
                    <div class="lab-actions">
                        <span class="btn btn-accent">Open lab</span>
                    </div>
                </a>
            </section>
        </main>
    </div>
</body>
</html>
