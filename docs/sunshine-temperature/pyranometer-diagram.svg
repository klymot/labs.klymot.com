<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320"
     role="img" aria-label="Cross-section diagram of a thermopile pyranometer">
  <title>Thermopile Pyranometer — Cross-section</title>
  <desc>Schematic cross-section: outer and inner glass domes, thermopile absorber disk, desiccant cartridge, instrument body, and signal output.</desc>

  <defs>
    <marker id="arr-ghi" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#d4a855"/>
    </marker>
    <marker id="arr-lead" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0,6 2,0 4" fill="#a8a090"/>
    </marker>
  </defs>

  <!-- ── GHI label ──────────────────────────────────────────────── -->
  <text x="220" y="16" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600"
        fill="#d4a855">Global Horizontal Irradiance (GHI)</text>

  <!-- GHI arrows — tips land at the outer dome surface -->
  <!--   centre (x=220): dome top at y=105 → arrow ends y=104      -->
  <!--   sides  (x=170/270): dome at y≈119  → arrows end y=118     -->
  <line x1="170" y1="24" x2="170" y2="116" stroke="#d4a855" stroke-width="2"
        marker-end="url(#arr-ghi)"/>
  <line x1="220" y1="24" x2="220" y2="103" stroke="#d4a855" stroke-width="2"
        marker-end="url(#arr-ghi)"/>
  <line x1="270" y1="24" x2="270" y2="116" stroke="#d4a855" stroke-width="2"
        marker-end="url(#arr-ghi)"/>

  <!-- ── Outer glass dome ───────────────────────────────────────── -->
  <!-- Semi-ellipse: centre (220,170), rx=80, ry=65 → top at (220,105) -->
  <!-- Sweep-flag=0 traces the upper (convex-upward) arc           -->
  <path d="M 140 170 A 80 65 0 0 1 300 170 Z"
        fill="rgba(212,168,85,0.10)" stroke="#d4a855" stroke-width="2.5"/>

  <!-- ── Inner glass dome ───────────────────────────────────────── -->
  <!-- Semi-ellipse: centre (220,170), rx=61, ry=48 → top at (220,122) -->
  <path d="M 159 170 A 61 48 0 0 1 281 170 Z"
        fill="rgba(212,168,85,0.08)" stroke="#d4a855" stroke-width="1.5"/>

  <!-- ── Instrument body ───────────────────────────────────────── -->
  <!-- Drawn after domes so body top edge sits cleanly on dome bases -->
  <rect x="140" y="170" width="160" height="72"
        fill="#152c4a" stroke="#d4a855" stroke-width="2"/>

  <!-- ── Thermopile absorber disk ──────────────────────────────── -->
  <ellipse cx="220" cy="182" rx="58" ry="7"
           fill="#0f1e35" stroke="#d4a855" stroke-width="0.8"/>

  <!-- ── Desiccant cartridge (attached to right of body) ───────── -->
  <rect x="300" y="186" width="17" height="40" rx="3"
        fill="#1e3355" stroke="#d4a855" stroke-width="1.5"/>
  <line x1="303" y1="194" x2="315" y2="194" stroke="#d4a855" stroke-width="0.6" opacity="0.5"/>
  <line x1="303" y1="201" x2="315" y2="201" stroke="#d4a855" stroke-width="0.6" opacity="0.5"/>
  <line x1="303" y1="208" x2="315" y2="208" stroke="#d4a855" stroke-width="0.6" opacity="0.5"/>
  <line x1="303" y1="215" x2="315" y2="215" stroke="#d4a855" stroke-width="0.6" opacity="0.5"/>

  <!-- ── Base plate with spirit level ─────────────────────────── -->
  <rect x="122" y="242" width="196" height="14" rx="3"
        fill="#1e3355" stroke="#d4a855" stroke-width="1.5"/>
  <circle cx="260" cy="249" r="5" fill="none" stroke="#d4a855" stroke-width="1.2"/>
  <circle cx="260" cy="249" r="2"  fill="#d4a855"/>

  <!-- ── Output wire and connector ─────────────────────────────── -->
  <line x1="220" y1="242" x2="220" y2="267"
        stroke="#d4a855" stroke-width="2"/>
  <rect x="213" y="267" width="14" height="6" rx="1.5" fill="#d4a855"/>

  <!-- ════════ RIGHT-SIDE LABELS ═══════════════════════════════════ -->

  <!-- Outer dome — leader points to right flank of outer arch (x=287, y≈135) -->
  <line x1="325" y1="106" x2="289" y2="133"
        stroke="#a8a090" stroke-width="1" fill="none" marker-end="url(#arr-lead)"/>
  <text x="327" y="102" font-family="system-ui,-apple-system,sans-serif"
        font-size="12" fill="#a8a090">Outer dome</text>
  <text x="327" y="116" font-family="system-ui,-apple-system,sans-serif"
        font-size="11" fill="#a8a090" opacity="0.8">(spectral correction)</text>

  <!-- Inner dome — leader points to right side of inner arch (x=267, y≈138) -->
  <line x1="325" y1="142" x2="269" y2="140"
        stroke="#a8a090" stroke-width="1" fill="none" marker-end="url(#arr-lead)"/>
  <text x="327" y="138" font-family="system-ui,-apple-system,sans-serif"
        font-size="12" fill="#a8a090">Inner dome</text>

  <!-- Desiccant — horizontal leader to cartridge -->
  <line x1="325" y1="206" x2="318" y2="206"
        stroke="#a8a090" stroke-width="1" fill="none" marker-end="url(#arr-lead)"/>
  <text x="327" y="202" font-family="system-ui,-apple-system,sans-serif"
        font-size="12" fill="#a8a090">Desiccant</text>

  <!-- ════════ LEFT-SIDE LABELS ════════════════════════════════════ -->

  <!-- Thermopile — leader points to left edge of absorber (x=162, y=182) -->
  <line x1="113" y1="182" x2="161" y2="182"
        stroke="#a8a090" stroke-width="1" fill="none" marker-end="url(#arr-lead)"/>
  <text x="111" y="178" text-anchor="end"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="12" fill="#a8a090">Thermopile</text>
  <text x="111" y="192" text-anchor="end"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="11" fill="#a8a090" opacity="0.8">(measures ΔT)</text>

  <!-- ════════ BOTTOM LABEL ════════════════════════════════════════ -->
  <line x1="220" y1="284" x2="220" y2="274"
        stroke="#a8a090" stroke-width="1" fill="none" marker-end="url(#arr-lead)"/>
  <text x="220" y="293" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#d4a855">Output: voltage ∝ irradiance (W/m²)</text>

</svg>
